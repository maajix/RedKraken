name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: python3 -m pip install PyYAML==6.0.3

      - name: Scope check self-test
        run: bash tests/test_scope_check.sh

      - name: Code preflight self-test
        if: always()
        run: bash tests/test_code_preflight.sh

      - name: Whitebox audit smoke test
        if: always()
        run: bash tests/test_audit_smoke.sh

      - name: Project skill discovery regression test
        if: always()
        run: python3 tests/test_skill_discovery.py

      - name: Unified playbook catalog gate
        if: always()
        run: |
          python3 scripts/rebuild_catalog.py
          git diff --exit-code -- playbooks/_catalog.md playbooks/_sources.tsv

      - name: Reviewed topic coverage gate
        if: always()
        run: bash tests/test_playbook_coverage.sh

      - name: Report renderer regression test
        if: always()
        run: python3 tests/test_render_report.py

      - name: Scope-guard hook regression test
        if: always()
        run: python3 tests/test_scope_guard_hook.py

      - name: Scope-guard deny-path regression test
        if: always()
        run: python3 tests/test_scope_guard_block.py

      - name: Rules-of-engagement policy regression test
        if: always()
        run: python3 tests/test_roe_policy.py

      - name: VHost direct-traffic policy regression test
        if: always()
        run: bash tests/test_vhost_discovery.sh

      - name: Completion-guard hook regression test
        if: always()
        run: python3 tests/test_completion_guard.py

      - name: Scope-proxy regression test
        if: always()
        run: python3 tests/test_scope_proxy.py

      - name: CI workflow regression test
        if: always()
        run: python3 tests/test_ci_workflow.py
